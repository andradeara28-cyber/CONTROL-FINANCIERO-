<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero - Multinegocio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #e1e8ed; padding-bottom: 8px; margin-top: 30px; }
        
        /* Estilos del Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .dash-card { background: #eef2f7; padding: 15px; border-radius: 8px; text-align: center; border-left: 5px solid #2980b9; transition: transform 0.2s; }
        .dash-card:hover { transform: translateY(-3px); }
        .dash-card h3 { margin: 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .dash-card p { margin: 8px 0 0 0; font-size: 20px; font-weight: bold; }
        
        /* Colores del balance general */
        .card-total { background: #2c3e50; color: white; border-left: none; }
        .card-total h3 { color: #bdc3c7; }
        
        /* Formulario */
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 30px; background: #fdfdfd; padding: 20px; border: 1px solid #e1e8ed; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #1a252f; }
        
        /* Tabla */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e1e8ed; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        tr:hover { background-color: #fdfdfd; }
        
        /* Badges y montos */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-ingreso { background: #e8f8f0; color: #2ecc71; }
        .badge-egreso { background: #fdedec; color: #e74c3c; }
        .badge-negocio { background: #eaf2f8; color: #2980b9; }
        .monto-ingreso { color: #2ecc71; font-weight: bold; }
        .monto-egreso { color: #e74c3c; font-weight: bold; }
        .monto-positivo { color: #2ecc71; }
        .monto-negativo { color: #e74c3c; }
        .btn-borrar { background: none; color: #e74c3c; border: none; cursor: pointer; padding: 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Control Financiero de Clientes</h1>
    
    <!-- DASHBOARD TIPO PANEL -->
    <h2>Dashboard de Negocios</h2>
    <div class="dashboard-grid">
        <div class="dash-card" style="border-left-color: #e67e22;">
            <h3>🥩 Carne</h3>
            <p id="saldo-carne">$0.00</p>
        </div>
        <div class="dash-card" style="border-left-color: #f1c40f;">
            <h3>🌾 Forrajera</h3>
            <p id="saldo-forrajera">$0.00</p>
        </div>
        <div class="dash-card" style="border-left-color: #2ecc71;">
            <h3>🌵 Tuna</h3>
            <p id="saldo-tuna">$0.00</p>
        </div>
        <div class="dash-card" style="border-left-color: #9b59b6;">
            <h3>🔴 Xoconostle</h3>
            <p id="saldo-xoconostle">$0.00</p>
        </div>
        <div class="dash-card card-total">
            <h3>💰 Balance Total</h3>
            <p id="balance-general">$0.00</p>
        </div>
    </div>

    <!-- FORMULARIO DE REGISTRO -->
    <h2>Registrar Nuevo Movimiento</h2>
    <form id="registro-form">
        <input type="text" id="cliente" placeholder="Nombre del Cliente" required>
        
        <select id="negocio" required>
            <option value="" disabled selected>Selecciona el Negocio</option>
            <option value="Carne">🥩 Carne</option>
            <option value="Forrajera">🌾 Forrajera</option>
            <option value="Tuna">🌵 Tuna</option>
            <option value="Xoconostle">🔴 Xoconostle</option>
        </select>

        <select id="tipo" required>
            <option value="Ingreso">Ingreso</option>
            <option value="Egreso">Egreso</option>
        </select>
        
        <input type="number" id="monto" placeholder="Monto ($)" min="0.01" step="0.01" required>
        <input type="text" id="concepto" placeholder="Concepto / Detalles" required>
        <button type="submit">Registrar</button>
    </form>

    <!-- TABLA DE HISTORIAL -->
    <h2>Historial General de Movimientos</h2>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Negocio</th>
                    <th>Tipo</th>
                    <th>Concepto</th>
                    <th>Monto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                <!-- Se rellena dinámicamente -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Inicializar o cargar desde LocalStorage
    let movimientos = JSON.parse(localStorage.getItem('movimientos_multinegocio')) || [];

    const form = document.getElementById('registro-form');
    const tablaCuerpo = document.getElementById('tabla-cuerpo');

    function actualizarInterfaz() {
        tablaCuerpo.innerHTML = '';
        
        // Estructura para acumular saldos individuales
        let saldos = { Carne: 0, Forrajera: 0, Tuna: 0, Xoconostle: 0 };
        let balanceTotal = 0;

        movimientos.forEach((mov, index) => {
            const montoNum = parseFloat(mov.monto);
            
            // Sumar o restar al negocio correspondiente
            if (mov.tipo === 'Ingreso') {
                saldos[mov.negocio] += montoNum;
                balanceTotal += montoNum;
            } else {
                saldos[mov.negocio] -= montoNum;
                balanceTotal -= montoNum;
            }

            // Crear la fila en la tabla
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${mov.cliente}</strong></td>
                <td><span class="badge badge-negocio">${obtenerEmoji(mov.negocio)} ${mov.negocio}</span></td>
                <td><span class="badge ${mov.tipo === 'Ingreso' ? 'badge-ingreso' : 'badge-egreso'}">${mov.tipo}</span></td>
                <td>${mov.concepto}</td>
                <td class="${mov.tipo === 'Ingreso' ? 'monto-ingreso' : 'monto-egreso'}">
                    ${mov.tipo === 'Ingreso' ? '+' : '-'} $${montoNum.toFixed(2)}
                </td>
                <td><button class="btn-borrar" onclick="eliminarMovimiento(${index})">Eliminar</button></td>
            `;
            tablaCuerpo.appendChild(tr);
        });

        // Actualizar las tarjetas del Dashboard con sus colores dinámicos
        actualizarTarjetaSaldo('saldo-carne', saldos.Carne);
        actualizarTarjetaSaldo('saldo-forrajera', saldos.Forrajera);
        actualizarTarjetaSaldo('saldo-tuna', saldos.Tuna);
        actualizarTarjetaSaldo('saldo-xoconostle', saldos.Xoconostle);
        
        // Actualizar balance general
        const elTotal = document.getElementById('balance-general');
        elTotal.innerText = `$${balanceTotal.toFixed(2)}`;
        elTotal.className = balanceTotal >= 0 ? 'monto-positivo' : 'monto-negativo';

        // Guardar cambios en LocalStorage
        localStorage.setItem('movimientos_multinegocio', JSON.stringify(movimientos));
    }

    function actualizarTarjetaSaldo(idElemento, saldo) {
        const elemento = document.getElementById(idElemento);
        elemento.innerText = `$${saldo.toFixed(2)}`;
        if (saldo > 0) {
            elemento.className = 'monto-positivo';
        } else if (saldo < 0) {
            elemento.className = 'monto-negativo';
        } else {
            elemento.className = '';
        }
    }

    function obtenerEmoji(negocio) {
        if (negocio === 'Carne') return '🥩';
        if (negocio === 'Forrajera') return '🌾';
        if (negocio === 'Tuna') return '🌵';
        if (negocio === 'Xoconostle') return '🔴';
        return '';
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const nuevoMovimiento = {
            cliente: document.getElementById('cliente').value.toUpperCase(),
            negocio: document.getElementById('negocio').value,
            tipo: document.getElementById('tipo').value,
            monto: document.getElementById('monto').value,
            concepto: document.getElementById('concepto').value.toUpperCase()
        };

        movimientos.push(nuevoMovimiento);
        actualizarInterfaz();
        form.reset();
    });

    function eliminarMovimiento(index) {
        if(confirm('¿Seguro que deseas eliminar este registro?')) {
            movimientos.splice(index, 1);
            actualizarInterfaz();
        }
    }

    // Carga inicial
    actualizarInterfaz();
</script>

</body>
</html>
